<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
    rel="stylesheet"
  >
  <link 
    rel="stylesheet" 
    href="style.css" 
    media="screen" 
    charset="utf-8"
  >
</head>
<body>
  <div class="todo">
    <header class="todo-header">
      <img 
        class="todo-header__image" 
        src="./eisenhower-matrix.jpg"
        alt="Eisenhower Matrix"
      >
      <a 
        class="todo-header__link" 
        href="https://goal-life.com/page/method/matrix-eisenhower"
      >
        Want more details?
      </a>
    </header>
    <main class="todo-main">
      <section id="todo-form">
        <label 
          for="new-task" 
          class="todo-form__label"
        >
          Add Item
        </label>
        <div class="todo-form__row">
          <input id="new-task" class="todo-form__input" type="text">
          <button class="todo-form__button">Add</button>
        </div>
      </section>
      <section class="todo-list">
        <h3 class="todo-list__title">Todo</h3>
        <ul class="todo-list todo-list--incompleted" id="incompleted-tasks">
          <li class="todo-item">
            <input type="checkbox" class="todo-item__checkbox">
            <label class="todo-item__label">
              Pay Bills
            </label>
            <input type="text" class="todo-item__input">
            <button class="todo-item__button todo-item__button--edit">
              Edit
            </button>
            <button class="todo-item__button todo-item__button--delete">
              <img class="todo-item__icon todo-item__icon--delete" src="./remove.svg" alt="Remove">
            </button>
          </li>
          <li class="todo-item todo-item--edit-mode">
            <input type="checkbox" class="todo-item__checkbox">
            <label class="todo-item__label">
              Go Shopping
            </label>
            <input type="text" value="Go Shopping" class="todo-item__input">
            <button class="todo-item__button todo-item__button--edit">
              Save
            </button>
            <button class="todo-item__button todo-item__button--delete">
              <img class="todo-item__icon todo-item__icon--delete" src="./remove.svg" alt="Remove">
            </button>
          </li>
        </ul>
        <h3 class="todo-list__title">Completed</h3>
        <ul class="todo-list todo-list--completed" id="completed-tasks">
          <li class="todo-item">
            <input type="checkbox" class="todo-item__checkbox" checked>
            <label class="todo-item__label">
              See the Doctor
            </label>
            <input type="text" class="todo-item__input">
            <button class="todo-item__button todo-item__button--edit">
              Edit
            </button>
            <button class="todo-item__button todo-item__button--delete">
              <img class="todo-item__icon todo-item__icon--delete" src="./remove.svg" alt="Remove">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </div>
</body>
</html>
